  e2e:
    name: E2E Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24.0'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-e2e-otp28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-otp28-

      - name: Generate certificates
        run: |
          chmod +x ./certs/generate_certs.sh
          ./certs/generate_certs.sh

      - name: Compile
        run: rebar3 compile

      - name: Run E2E tests
        run: rebar3 ct --suite=quic_e2e_SUITE

  server-batching-gso:
    name: Server Batching + Linux GSO
    needs: unit-tests
    # Pinned to ubuntu-24.04 (kernel 6.x) so UDP_SEGMENT / GSO is
    # guaranteed available; the suite hard-fails when GSO is expected
    # but missing, so we must not let the runner label drift onto a
    # kernel without UDP GSO support.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24.0'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-batching-otp28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-batching-otp28-

      - name: Generate certificates
        run: |
          chmod +x ./certs/generate_certs.sh
          ./certs/generate_certs.sh

      - name: Compile
        run: rebar3 compile

      - name: Run batching CT suite (with GSO)
        env:
          QUIC_ENABLE_GSO_TEST: "1"
        run: rebar3 ct --suite=quic_server_batching_SUITE

  h3-e2e:
    name: HTTP/3 E2E Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24.0'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-h3-e2e-otp28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-h3-e2e-otp28-

      - name: Generate certificates
        run: |
          chmod +x ./certs/generate_certs.sh
          ./certs/generate_certs.sh

      - name: Compile
        run: rebar3 compile

      - name: Run H3 E2E tests
        run: rebar3 ct --suite=quic_h3_e2e_SUITE

  interop:
    name: Interop Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24.0'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-interop-otp28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-interop-otp28-

      - name: Generate certificates
        run: |
          chmod +x ./certs/generate_certs.sh
          ./certs/generate_certs.sh

      - name: Build Docker images
        run: docker compose -f docker/docker-compose.yml build

      - name: Start QUIC servers
        run: |
          docker compose -f docker/docker-compose.yml up -d
          for i in {1..30}; do
            if docker compose -f docker/docker-compose.yml ps | grep -q "healthy"; then
              echo "Servers are healthy"
              break
            fi
            echo "Waiting for servers... ($i/30)"
            sleep 2
          done

      - name: Compile
        run: rebar3 compile

      - name: Run Interop tests
        run: rebar3 ct --suite=quic_interop_SUITE
        env:
          QUIC_AIOQUIC_HOST: 127.0.0.1
          QUIC_AIOQUIC_PORT: 4433
          QUIC_QUICGO_HOST: 127.0.0.1
          QUIC_QUICGO_PORT: 4434

      - name: Collect server logs
        if: failure()
        run: |
          echo "=== QUIC Server Logs (aioquic) ==="
          docker compose -f docker/docker-compose.yml logs quic-server
          echo "=== QUIC Server Logs (quic-go) ==="
          docker compose -f docker/docker-compose.yml logs quic-go-server || true

      - name: Stop QUIC servers
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: 'nightly'

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: |
            _build/*_plt
            ~/.cache/rebar3
          key: ${{ runner.os }}-plt-otp28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-otp28-

      - name: Run Dialyzer
        run: rebar3 dialyzer

  xref:
    name: XRef
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: 'nightly'

      - name: Run XRef
        run: rebar3 xref

  format:
    name: erlfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: 'nightly'

      - name: Run erlfmt check
        run: rebar3 fmt --check

  lint:
    name: Elvis lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: 'nightly'

      - name: Run elvis lint
        run: rebar3 lint
